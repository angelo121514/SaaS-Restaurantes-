# Supabase project config — CMOR FLOW
# Ver: https://supabase.com/docs/guides/cli/config
# Ajustar project_id con el ref real de tu proyecto Supabase (en supabase.com/dashboard → Settings → General)

project_id = "clsgoknzyhkxtogxoshz"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "5MB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
# refresh_token_rotation_enabled = true
# refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
template = {}
max_frequency = "1s"

[auth.sms]
enable_signup = false

[functions.verify-dsar]
verify_jwt = false

[functions.privacy-erase]
verify_jwt = false

[functions.privacy-access]
verify_jwt = false

[functions.privacy-export]
verify_jwt = false

[functions.privacy-rectify]
verify_jwt = false

[functions.privacy-object]
verify_jwt = false

[functions.privacy-revoke-consent]
verify_jwt = false

[functions.invite-owner]
verify_jwt = false

[functions.create-payment-intent]
verify_jwt = false

[functions.webhooks]
verify_jwt = false
