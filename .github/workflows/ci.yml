name: CI

on:
  pull_request:
    branches: [main, "feature/**"]
  push:
    branches: [main]

# Cancelar workflows anteriores en el mismo PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: Lint + Type-check + Build
  # ─────────────────────────────────────────────────────
  build:
    name: Lint + Type-check + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://example.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'test-anon-key' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  # ─────────────────────────────────────────────────────
  # Job 2: Tests unitarios (Vitest)
  # ─────────────────────────────────────────────────────
  test-unit:
    name: Tests unitarios
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --reporter=verbose
        env:
          VITEST_VERBOSE: "1"

      - name: Run security tests
        run: npm run test:security || true # Skip si no hay Supabase local

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────
  # Job 3: Tests E2E (Playwright) — skip si no hay Vercel URL
  # ─────────────────────────────────────────────────────
  test-e2e:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: false # Habilitar cuando haya staging URL configurada
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_OWNER_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
          E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_RESTAURANT_SLUG: ${{ secrets.E2E_RESTAURANT_SLUG }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ─────────────────────────────────────────────────────
  # Job 4: Audit de seguridad (npm audit + secret scanning)
  # ─────────────────────────────────────────────────────
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (alta+crítica)
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: Buscar secretos hardcodeados
        run: |
          ! grep -rE "(sk_live_[a-zA-Z0-9]{24}|sk_test_[a-zA-Z0-9]{24}|eyJhbGci|ghp_[a-zA-Z0-9]{36}|xoxb-[a-zA-Z0-9-]+)" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" \
            src/ supabase/ 2>/dev/null || \
          (echo "❌ Secret encontrado en código" && exit 1)

      - name: Verificar que .env no está commiteado
        run: |
          if git ls-files | grep -q "^\.env$"; then
            echo "❌ .env está commiteado al repo"
            exit 1
          else
            echo "✅ .env no está en git"
          fi

  # ─────────────────────────────────────────────────────
  # Job 5: Resumen (gate para merge)
  # ─────────────────────────────────────────────────────
  all-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [build, test-unit, security-audit]
    if: always()
    steps:
      - name: Check job status
        if: ${{ needs.build.result != 'success' || needs.test-unit.result != 'success' || needs.security-audit.result != 'success' }}
        run: |
          echo "❌ Alguno de los jobs falló:"
          echo "  build: ${{ needs.build.result }}"
          echo "  test-unit: ${{ needs.test-unit.result }}"
          echo "  security-audit: ${{ needs.security-audit.result }}"
          exit 1
      - name: All good
        run: echo "✅ Todos los checks pasaron — OK para merge"
